name: CI/CD Pipeline — Docker Compose Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # Allows manual trigger from GitHub UI

env:
  AWS_REGION:      ap-south-1
  AWS_ACCOUNT_ID:  "652942059153"
  ECR_REPOSITORY:  hudocafe/api
  IMAGE_TAG:       ${{ github.sha }}

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY"
          docker build \
            --platform linux/amd64 \
            --cache-from "$IMAGE:latest" \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t "$IMAGE:$IMAGE_TAG" \
            -t "$IMAGE:latest" \
            ./app
          
          docker push "$IMAGE:$IMAGE_TAG"
          docker push "$IMAGE:latest"
          echo "✅ Successfully built and pushed $IMAGE:$IMAGE_TAG"

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copy Compose and Nginx configs to Server
        run: |
          # Create app directory if not exists
          ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.EC2_HOST }} "mkdir -p ~/app/nginx"
          # Copy docker-compose.yml
          scp -i ~/.ssh/id_rsa docker-compose.yml ubuntu@${{ secrets.EC2_HOST }}:~/app/docker-compose.yml
          # Copy Nginx default.conf
          scp -i ~/.ssh/id_rsa nginx/default.conf ubuntu@${{ secrets.EC2_HOST }}:~/app/nginx/default.conf

      - name: Run Deploy Script on EC2
        run: |
          ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.EC2_HOST }} "
            # Login to ECR on the host using temporary runner credentials passed on the fly
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            docker login --username AWS --password-stdin ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
            
            cd ~/app
            
            # Write environment variables to .env
            echo 'AWS_ACCOUNT_ID=${{ env.AWS_ACCOUNT_ID }}' > .env
            echo 'AWS_REGION=${{ env.AWS_REGION }}' >> .env
            echo 'IMAGE_TAG=${{ env.IMAGE_TAG }}' >> .env
            echo 'DB_NAME=${{ secrets.DB_NAME }}' >> .env
            echo 'DB_USER=${{ secrets.DB_USER }}' >> .env
            echo 'DB_PASSWORD=${{ secrets.DB_PASSWORD }}' >> .env
            
            # Pull new image and restart services
            docker compose pull
            docker compose up -d --remove-orphans
            
            # Verify containers are running
            docker ps
          "

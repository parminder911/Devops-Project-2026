name: CD — Deploy via ArgoCD Sync

on:
  # Triggered after CI pipeline completes
  workflow_run:
    workflows: ["CI — Build & Push to ECR"]
    types: [completed]
    branches: [main]

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      force_sync:
        description: "Force ArgoCD sync"
        required: false
        default: "false"

jobs:
  deploy:
    name: Trigger ArgoCD Sync
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout Source
        uses: actions/checkout@v4

      # ── 2. Install ArgoCD CLI ────────────────────────────────────────────────
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/

      # ── 3. Login to ArgoCD ───────────────────────────────────────────────────
      - name: Login to ArgoCD
        run: |
          argocd login \
            ${{ secrets.ARGOCD_SERVER }} \
            --username admin \
            --password ${{ secrets.ARGOCD_PASSWORD }} \
            --insecure   # Use --grpc-web if behind TLS

      # ── 4. Sync Application ──────────────────────────────────────────────────
      - name: Sync ArgoCD Application
        run: |
          echo "🔄 Syncing ArgoCD application: hudocafe-app"
          argocd app sync hudocafe-app --prune --timeout 300

      # ── 5. Wait for Healthy ──────────────────────────────────────────────────
      - name: Wait for Application Healthy
        run: |
          argocd app wait hudocafe-app \
            --health \
            --timeout 300
          echo "✅ Application is healthy!"

      # ── 6. Verify Health Endpoint ────────────────────────────────────────────
      - name: Verify Health Endpoint
        run: |
          sleep 15
          RESPONSE=$(curl -sf https://api.hudocafe.com/health || echo "FAILED")
          echo "Health check response: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"status":"healthy"'; then
            echo "✅ Health check PASSED"
          else
            echo "⚠️  Health check returned unexpected response (may still be starting)"
          fi

      # ── 7. Deployment Summary ────────────────────────────────────────────────
      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **App URL**: https://api.hudocafe.com" >> $GITHUB_STEP_SUMMARY
          echo "- **ArgoCD**: https://argocd.hudocafe.com" >> $GITHUB_STEP_SUMMARY

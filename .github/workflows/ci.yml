name: CI — Build & Push to ECR

on:
  push:
    branches: [main]
    paths:
      - "app/**"              # Only trigger when app code changes
      - ".github/workflows/ci.yml"

env:
  AWS_REGION:      ap-south-1
  ECR_REPOSITORY:  hudocafe/api
  IMAGE_TAG:       ${{ github.sha }}

jobs:
  build-and-push:
    name: Build Docker Image & Push to ECR
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout Source
        uses: actions/checkout@v4

      # ── 2. AWS Credentials ───────────────────────────────────────────────────
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── 3. Login to ECR ──────────────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 4. Docker Buildx ─────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 5. Build & Push ──────────────────────────────────────────────────────
      - name: Build and Push Docker Image
        id: meta
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY"
          TAG="${{ github.sha }}"

          echo "🔨 Building image: $IMAGE:$TAG"

          docker build \
            --platform linux/amd64 \
            --cache-from "$IMAGE:latest" \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t "$IMAGE:$TAG" \
            -t "$IMAGE:latest" \
            ./app

          docker push "$IMAGE:$TAG"
          docker push "$IMAGE:latest"

          echo "image-tag=$TAG" >> $GITHUB_OUTPUT
          echo "✅ Pushed: $IMAGE:$TAG"

      # ── 6. Update K8s Deployment Image Tag ──────────────────────────────────
      # GitOps: update the image tag in the manifest so ArgoCD detects change
      - name: Update K8s Deployment Image Tag
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          NEW_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"

          # Update image in deployment.yaml
          sed -i "s|image:.*hudocafe/api.*|image: $NEW_IMAGE|g" k8s/app/deployment.yaml

          # Commit and push the manifest update
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add k8s/app/deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update image to ${{ github.sha }}"
          git push

      # ── 7. Security Scan ─────────────────────────────────────────────────────
      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          format:    table
          severity:  CRITICAL,HIGH
          exit-code: 0   # Don't fail build on vulnerabilities (report only)

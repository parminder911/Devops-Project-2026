# ── Rate Limiting (Outside server block, loaded in http context) ──────────────────
# 10MB zone allows storing about 160,000 IP addresses. Limit is 30 requests/minute per client.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

server {
    listen 80 default_server;
    server_name hudocafe.com www.hudocafe.com;

    # ── Real IP from AWS ALB ──────────────────────────────────────────
    # The default VPC CIDR in ap-south-1 is 172.31.0.0/16.
    # This tells Nginx to trust the X-Forwarded-For header from AWS load balancers.
    set_real_ip_from      172.31.0.0/16;
    real_ip_header        X-Forwarded-For;
    real_ip_recursive     on;

    # ── Security Headers ──────────────────────────────────────────────
    add_header X-Frame-Options            "DENY"            always;
    add_header X-Content-Type-Options     "nosniff"         always;
    add_header X-XSS-Protection           "1; mode=block"   always;
    add_header Content-Security-Policy    "default-src 'self';" always;
    add_header Referrer-Policy            "strict-origin"   always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;

    # ── Proxy to FastAPI ──────────────────────────────────────────────
    location / {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass         http://web:8000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;

        # Gzip compression
        gzip              on;
        gzip_types        application/json text/plain;
        gzip_min_length   1000;
    }

    # ── Health Check (no rate limit) ──────────────────────────────────
    location /health {
        proxy_pass http://web:8000/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Block common attack paths ─────────────────────────────────────
    location ~ /\. {
        deny all;
    }
}

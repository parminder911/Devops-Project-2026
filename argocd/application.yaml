apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hudocafe-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  # ── Source: Your GitHub Repo ──────────────────────────────────────────────
  source:
    repoURL: https://github.com/YOUR_USERNAME/DevOps-project    # ← Change this!
    targetRevision: main
    path: k8s   # ArgoCD watches this directory for changes

  # ── Destination: K8s cluster ──────────────────────────────────────────────
  destination:
    server:    https://kubernetes.default.svc
    namespace: production

  # ── Sync Policy (GitOps) ─────────────────────────────────────────────────
  syncPolicy:
    automated:
      prune:    true    # Delete resources removed from Git
      selfHeal: true    # Auto-fix drift between Git and cluster
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration:    5s
        factor:      2
        maxDuration: 3m

  # ── Health Checks ─────────────────────────────────────────────────────────
  revisionHistoryLimit: 5

apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: production
type: Opaque
# Values must be base64 encoded:
# echo -n 'your_value' | base64
# To decode: echo 'encoded' | base64 -d
stringData:
  DB_NAME:     "app_db"
  DB_USER:     "app_user"
  DB_PASSWORD: "CHANGE_ME_STRONG_PASSWORD"     # ← Change before deploying!
---
apiVersion: v1
kind: Secret
metadata:
  name: ecr-secret
  namespace: production
type: kubernetes.io/dockerconfigjson
data:
  # Generated by: kubectl create secret docker-registry ecr-secret \
  #   --docker-server=<ACCOUNT_ID>.dkr.ecr.ap-south-1.amazonaws.com \
  #   --docker-username=AWS \
  #   --docker-password=$(aws ecr get-login-password --region ap-south-1) \
  #   --namespace=production --dry-run=client -o yaml
  .dockerconfigjson: PLACEHOLDER_REPLACE_WITH_ECR_AUTH

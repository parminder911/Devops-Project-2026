apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: production
  labels:
    app: api
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:       1    # Allow 1 extra pod during update
      maxUnavailable: 0    # Zero-downtime: never kill old pod before new is ready
  template:
    metadata:
      labels:
        app: api
        tier: backend
      annotations:
        # Forces pod restart when image changes even if tag is same
        rollme: "{{ randAlphaNum 5 | quote }}"
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: api
          # ← CI/CD will update this image tag automatically
          image: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/hudocafe/api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_PASSWORD
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds:       15
            failureThreshold:    3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds:       10
          resources:
            requests:
              memory: "128Mi"
              cpu:    "100m"
            limits:
              memory: "512Mi"
              cpu:    "500m"
